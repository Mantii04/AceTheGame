name: AceTheGame CI
on: [push, workflow_dispatch, pull_request]

jobs:
  ACE:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "true"

      - name: "apt update"
        run: sudo apt-get update
      - name: "install compiler and build tools"
        run: sudo apt-get install build-essential

      - name: create build directory
        working-directory: ./ACE
        run: mkdir build

      # debug build
      - name: debug build
        working-directory: ./ACE/build
        run: |
          cmake -DCMAKE_BUILD_TYPE=Debug ../
          make -j${nproc}

      # release build
      - name: release build
        working-directory: ./ACE/build
        run: |
          cmake -DCMAKE_BUILD_TYPE=Release ../ 
          make -j${nproc}

      # Save the compiled native tools so the ATG job can grab them
      - name: Upload ACE Compiled Binaries
        uses: actions/upload-artifact@v4
        with:
          name: ace-native-bins
          path: |
            ./ACE/build/util_client
            ./ACE/build/ace

  Modder-linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "true"
      - name: "apt update"
        run: sudo apt-get update
      - name: "install build dependecies"
        run: sudo apt-get install openjdk-17-jdk-headless apktool gradle

      - name: generating code for injection
        working-directory: ./Modder/injector
        run: python3 ./gen_smali.py

      - name: build
        working-directory: ./Modder
        run: ./gradlew build -x test

  Modder-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "true"
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10' 
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu' 
          java-version: '17'
      - name: "install build tools"
        run: choco install apktool --version=2.5.0
      - name: "install pkgconfig"
        run: choco install pkgconfiglite
      - name: generating code for injection
        working-directory: ./Modder/injector
        run: python3 ./gen_smali.py
      - name: build
        working-directory: ./Modder
        run: ./gradlew build -x test

  ATG:
    runs-on: ubuntu-22.04
    needs: ACE # 🧠 Makes sure the app build waits until the C++ engine is done
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "true"

      - name: "apt update"
        run: sudo apt-get update
      - name: "install build dependencies"
        run: sudo apt-get install openjdk-17-jdk-headless fd-find

      - name: "setup JAVA_HOME to java 17"
        working-directory: /usr/lib/jvm
        run: |
          fdfind java-17 | xargs readlink -f | awk '{print "JAVA_HOME="$1""}' >> $GITHUB_ENV

      # 🟢 PULL THE C++ DAEMON BINARIES IN
      - name: Download ACE Binaries
        uses: actions/download-artifact@v4
        with:
          name: ace-native-bins
          path: ./ATG/app/src/main/assets/bin/ACE/arm64-v8a/

      # Verify the directory structure aligns with AssetManager requirements
      - name: Verify Assets Placement
        run: |
          ls -R ./ATG/app/src/main/assets/

      - name: build
        working-directory: ./ATG
        run: |
          ./gradlew assembleDebug

      - name: Upload Functional AceTheGame APK
        uses: actions/upload-artifact@v4
        with:
          name: AceTheGame-Fixed-APK
          path: ./ATG/app/build/outputs/apk/debug/*.apk

  billing-hack:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: "true"
      - name: "apt update"
        run: sudo apt-get update
      - name: "install build dependencies"
        run: sudo apt-get install openjdk-17-jdk-headless fd-find
      - name: "setup JAVA_HOME to java 17"
        working-directory: /usr/lib/jvm
        run: |
          fdfind java-17 | xargs readlink -f | awk '{print "JAVA_HOME="$1""}' >> $GITHUB_ENV
      - name: build
        working-directory: ./billing-hack
        run: ./gradlew assembleDebug